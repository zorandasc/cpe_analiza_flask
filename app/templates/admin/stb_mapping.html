{% extends "base.html" %} {% block title %}CPE Analzia | Mapiranje STB oprema{% endblock %} {% block content
%}
<div class=" py-4">
<div class="d-flex align-items-center justify-content-between my-4">
  <a href="{{ url_for('admin.stb_types') }}"
            class="btn btn-outline-secondary w-10-flex align-items-center justify-content-start">
            <span class="me-2">⬅</span> Nazad
  </a>
    <h2>Mapiranje eksterne STB opreme</h2>
    <div style="width: 95px;" class="d-none d-md-block"></div>
</div>
<form method="POST">
  <table border="1" cellpadding="8" class="table table-striped table-bordered shadow-lg">
    <thead class="table-success">
      <tr>
        <th>External ID</th>
        <th>External Name</th>
        <th>Mapped STB Type</th>
      </tr>
    </thead>
    <tbody>
      {% for m in mappings %}
      <tr>
        <td>{{ m.external_id }}</td>
        <td>{{ m.external_name }}</td>
        <td>
          <select name="map_{{ m.external_id }}">
            <option value="">-- Unmapped --</option>

            {% for stb in stb_types %}
              <option value="{{ stb.id }}"
                {% if m.stb_type_id == stb.id %}selected{% endif %}>
                {{ stb.name }}
              </option>
            {% endfor %}

          </select>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>

  <br>
  <button type="submit" class="btn btn-success"> Save Changes</button>
</form>
</div>
{% endblock %}
